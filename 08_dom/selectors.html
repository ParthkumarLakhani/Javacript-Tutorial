✅ 1. innerText

    Returns only the visible text inside an element.
    Respects CSS styles like
    display: none, visibility: hidden, opacity: 0.
    Triggers reflow because it checks layout and styling.
    Slower than textContent.
    Use when you want exactly what is visible to the user.



✅ 2. textContent

    Returns all the text, even if some elements are hidden.
    Does NOT check CSS or layout → very fast.
    Does NOT interpret HTML tags.
    Safe to use for plain-text operations.


✅ 3. innerHTML

    Returns HTML + text (the entire markup inside the element).
    Can also insert HTML into the element.
    Useful for dynamic UI rendering.
    ⚠️ Not safe with user-input → can cause XSS attacks.



| Property        | What It Returns   | Shows Hidden Text? | Reads HTML Tags? | Speed  |
| --------------- | ----------------- | ------------------ | ---------------- | ------ |
| **innerText**   | Visible text only | ❌ No               | ❌ No           | Slow   |
| **textContent** | All text          | ✅ Yes              | ❌ No           | Fast   |
| **innerHTML**   | HTML + text       | ✅ Yes              | ✅ Yes          | Medium |


📌 When to Use?
✔ Use textContent
  For fast, safe plain text (recommended in most cases).

✔ Use innerText
  When you want exactly what appears on the screen.

✔ Use innerHTML
  When you need to create or read HTML structure.
